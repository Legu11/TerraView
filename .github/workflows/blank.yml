name: CI Security Pipeline

on:
  push:
    # Déclenchement sur n'importe quelle version de ta branche (casse ignorée)
    branches: ["Pipeline-CI/CD", "pipeline-ci/cd"]
  pull_request:
    branches: ["Pipeline-CI/CD", "pipeline-ci/cd"]

jobs:
  security:
    name: Analyse Sécurité Globale
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Préparation de Node.js
      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Installation intelligente des dépendances
      - name: Installation des dépendances
        run: |
          # Cette commande cherche le dossier contenant package.json
          PACKAGE_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1)
          if [ -z "$PACKAGE_PATH" ]; then
            echo "ERREUR : Aucun package.json trouvé dans le dépôt !"
            exit 1
          fi
          
          # On extrait le dossier
          ROOT_DIR=$(dirname "$PACKAGE_PATH")
          echo "Dossier du projet détecté : $ROOT_DIR"
          
          # On se déplace et on installe
          cd "$ROOT_DIR"
          npm install

      # --- ÉTAPE 1 : SNYK ---
      - name: Scan Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_API }}
        with:
          args: --severity-threshold=low

      # --- ÉTAPE 2 : DEEPSOURCE ---
      - name: DeepSource Analysis
        # Utilisation du script curl plus robuste si le repo est complexe
        run: |
          curl https://deepsource.io/cli | sh
          ./bin/deepsource report --token ${{ secrets.DEEPSOURCE_API }}
        continue-on-error: true

      # --- ÉTAPE 3 : GITGUARDIAN ---
      - name: Scan GitGuardian
        uses: GitGuardian/ggshield-action@master
        continue-on-error: true
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API }}

  validation:
    needs: security
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Rapport Final
        run: echo "Analyse multi-outils terminée !"
