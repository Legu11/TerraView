name: CI Security Pipeline

on:
  push:
    branches: ["Pipeline-CI/CD"]
  pull_request:
    branches: ["Pipeline-CI/CD"]

jobs:
  security:
    name: Analyse Sécurité Globale
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère tout l'historique et toutes les branches

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Diagnostic et Installation
        run: |
          echo "--- LISTING DES FICHIERS ---"
          ls -R
          
          echo "--- RECHERCHE DU PACKAGE.JSON ---"
          # Recherche insensible à la casse pour voir s'il y a une erreur de nom
          PACKAGE_PATH=$(find . -iname "package.json" -not -path "*/node_modules/*" | head -n 1)
          
          if [ -z "$PACKAGE_PATH" ]; then
            echo "ERREUR CRITIQUE : package.json est réellement absent du dépôt."
            echo "Vérifiez que vous avez bien fait : git add package.json && git commit"
            exit 1
          else
            ROOT_DIR=$(dirname "$PACKAGE_PATH")
            echo "Projet trouvé dans : $ROOT_DIR"
            cd "$ROOT_DIR"
            npm install
          fi

      # Les étapes suivantes (Snyk, DeepSource, GitGuardian) restent identiques...
      - name: Scan Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_API }}
