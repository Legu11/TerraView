name: Analyse de Sécurité

on:
  push:
    branches: ["Pipeline-CI/CD"] # Vérifie bien l'orthographe exacte de ta branche
  pull_request:
    branches: ["Pipeline-CI/CD"]

jobs:
  security:
    name: Analyse Sécurité Globale
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Optimise la vitesse

      - name: Installation des dépendances
        run: npm ci # 'npm ci' est plus propre pour les pipelines que 'npm install'

      # --- ÉTAPE 1 : SNYK ---
      - name: Scan Snyk
        uses: snyk/actions/node@master
        continue-on-error: true # Évite de bloquer toute la suite si une faille est trouvée
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_API }}
        with:
          args: --severity-threshold=low

      # --- ÉTAPE 2 : DEEPSOURCE ---
      - name: DeepSource Analysis
        uses: deepsourcelabs/test-coverage-action@master
        with:
          key: javascript
          dsn: ${{ secrets.DEEPSOURCE_API }}
        continue-on-error: true

      # --- ÉTAPE 3 : GITGUARDIAN ---
      - name: Scan GitGuardian
        uses: GitGuardian/ggshield-action@master
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base_ref }}
          GITHUB_PULL_REQUEST_NUMBER: ${{ github.event.number }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API }}

  validation:
    needs: security
    runs-on: ubuntu-latest
    if: always() # S'assure que le rapport s'affiche même si les scans trouvent des erreurs
    steps:
      - name: Rapport Final
        run: echo "Analyse multi-outils terminée !"
