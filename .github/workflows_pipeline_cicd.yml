on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  security:
    name: Analyse Sécurité Globale
    runs-on: ubuntu-latest
    steps:
      # 1. Récupération du code
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Préparation de Python (pour le backend Flask)
      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Installation des dépendances Python
      - name: Installation des dépendances
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f database/requirements.txt ]; then
            pip install -r database/requirements.txt
          fi

      # --- ÉTAPE 1 : GITLEAKS (Détection de Secrets) ---
      - name: Scan GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- ÉTAPE 2 : SNYK (Sécurité dépendances Python) ---
      - name: Scan Snyk
        uses: snyk/actions/python@master
        with:
          args: --severity-threshold=low
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_API }}
        continue-on-error: true

      # --- ÉTAPE 3 : DEEPSOURCE (Analyse Qualité & Sécurité) ---
      - name: DeepSource Analysis
        uses: deepsourcelabs/test-coverage-action@master
        with:
          key: python
          dsn: ${{ secrets.DEEPSOURCE_API }}
        continue-on-error: true

  validation:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Rapport Final
        run: echo "Analyse multi-outils (GitLeaks, Snyk, DeepSource) terminée avec succès !"
