<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AgriData - système d'alertes par parcelle avec niveau de gravité et filtres.">
    <title>AgriData - Alertes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <div class="brand">
            <span class="brand-name">AgriData</span>
            <span class="brand-tag">Suivi cultures</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Tableau de bord</a></li>
                <li><a href="parcelles.html">Parcelles</a></li>
                <li><a href="cultures.html">Cultures</a></li>
                <li><a href="observations.html">Observations</a></li>
                <li><a href="alertes.html">Alertes</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            Bachelor 2 — Sup de Vinci<br>
            Chambre d'Agriculture
        </div>
    </aside>

    <main class="content">

        <header class="page-header">
            <div>
                <h1>Alertes</h1>
                <p class="subtitle">Niveau 1 = vigilance, Niveau 2 = critique.</p>
            </div>
        </header>

        <section id="alertes-kpis" class="kpis"></section>

        <section class="filters">
            <div class="filter-field">
                <label for="filter-type">Type</label>
                <select id="filter-type">
                    <option value="">Tous</option>
                    <option>Stress hydrique</option>
                    <option>Risque maladie</option>
                </select>
            </div>
            <div class="filter-field">
                <label for="filter-niveau">Niveau</label>
                <select id="filter-niveau">
                    <option value="">Tous</option>
                    <option value="1">Niveau 1 - vigilance</option>
                    <option value="2">Niveau 2 - critique</option>
                </select>
            </div>
        </section>

        <table class="t">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Parcelle</th>
                    <th>Niveau</th>
                </tr>
            </thead>
            <tbody id="alertes-body"></tbody>
        </table>

    </main>

</div>

<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
