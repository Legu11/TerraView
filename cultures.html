<!DOCTYPE html>
<html lang="fr">

    <meta charset="UTF-8">

    <title>AgriData - Cultures</title>

<body>

<div class="layout">

    <aside class="sidebar">
        <div class="brand">
            <span class="brand-name">AgriData</span>

        <nav>
            <ul>

        </div>
