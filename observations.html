<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Terraview - historique des observations terrain avec filtres par état et par parcelle.">
    <title>Terraview - Observations</title>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>

<header class="topbar">
    <div class="topbar-inner">
        <a href="index.html" class="brand">
            <span class="logo">T</span>
            <span class="name">Terraview</span>
        </a>
        <nav>
            <a href="dashboard.html">Tableau de bord</a>
            <a href="parcelles.html">Parcelles</a>
            <a href="cultures.html">Cultures</a>
            <a href="observations.html">Observations</a>
            <a href="alertes.html">Alertes</a>
        </nav>
        <div class="topbar-right">Bachelor 2 - Sup de Vinci</div>
    </div>
</header>

<main class="content">

    <div class="page-header">
        <div>
            <h1>Observations</h1>
            <p class="subtitle">Historique des relevés terrain triés du plus récent au plus ancien.</p>
        </div>
        <button id="btn-toggle-form" class="btn btn-primary" type="button">+ Saisir une observation</button>
    </div>

    <section id="form-zone" class="form-inline" hidden>
        <h3>Nouvelle observation</h3>
        <form id="obs-form">
            <div class="form-grid">
                <div class="form-row">
                    <label>Date</label>
                    <input type="date" name="date" required>
                </div>
                <div class="form-row">
                    <label>Parcelle</label>
                    <select name="parcelle_id" id="obs-parcelle" required>
                        <option value="">— choisir —</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>État</label>
                    <select name="etat" required>
                        <option value="OK">OK</option>
                        <option value="Stress hydrique">Stress hydrique</option>
                        <option value="Risque maladie">Risque maladie</option>
                        <option value="Maladie détectée">Maladie détectée</option>
                    </select>
                </div>
                <div class="form-row form-row-wide">
                    <label>Commentaire</label>
                    <input type="text" name="commentaire" maxlength="255" placeholder="optionnel">
                </div>
            </div>
            <div id="form-error" class="form-error" hidden></div>
            <div class="form-actions">
                <button type="button" id="btn-cancel" class="btn btn-ghost">Annuler</button>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
            </div>
        </form>
    </section>

    <section class="filters">
        <div class="filter-field">
            <label for="filter-etat">État</label>
            <select id="filter-etat">
                <option value="">Tous</option>
                <option>OK</option>
                <option>Stress hydrique</option>
                <option>Risque maladie</option>
                <option>Maladie détectée</option>
            </select>
        </div>
        <div class="filter-field">
            <label for="filter-parcelle">Parcelle</label>
            <select id="filter-parcelle">
                <option value="">Toutes</option>
            </select>
        </div>
    </section>

    <div class="t-wrap">
        <table class="t">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Parcelle</th>
                    <th>État</th>
                    <th>Commentaire</th>
                </tr>
            </thead>
            <tbody id="observations-body"></tbody>
        </table>
    </div>

</main>

<footer class="foot">Terraview - Bachelor 2 Sup de Vinci - Chambre d'Agriculture</footer>

<script src="js/data.js?v=3"></script>
<script src="js/api.js?v=3"></script>
<script src="js/app.js?v=3"></script>
<script src="js/auth.js?v=3"></script>
</body>
</html>
