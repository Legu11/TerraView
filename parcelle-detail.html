<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AgriData - fiche détaillée d'une parcelle avec cultures, observations, alertes et météo locale.">
    <title>AgriData - Détail parcelle</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <div class="brand">
            <span class="brand-name">AgriData</span>
            <span class="brand-tag">Suivi cultures</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Tableau de bord</a></li>
                <li><a href="parcelles.html">Parcelles</a></li>
                <li><a href="cultures.html">Cultures</a></li>
                <li><a href="observations.html">Observations</a></li>
                <li><a href="alertes.html">Alertes</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            Bachelor 2 — Sup de Vinci<br>
            Chambre d'Agriculture
        </div>
    </aside>

    <main class="content" id="parcelle-detail">

        <header class="page-header">
            <div>
                <h1 id="parcelle-title">Détail de la parcelle</h1>
                <p class="subtitle" id="parcelle-subtitle">Chargement…</p>
            </div>
            <a href="parcelles.html" class="back-link">← Retour à la liste</a>
        </header>

        <section id="parcelle-kpis" class="kpis"></section>

        <section class="split section">
            <div class="stack">
                <div>
                    <h2 class="section-title">Cultures associées</h2>
                    <div id="parcelle-cultures"></div>
                </div>
                <div>
                    <h2 class="section-title">Observations récentes</h2>
                    <div id="parcelle-observations"></div>
                </div>
            </div>
            <div class="stack">
                <div>
                    <h2 class="section-title">Alertes sur la parcelle</h2>
                    <div id="parcelle-alertes"></div>
                </div>
                <div>
                    <h2 class="section-title">Météo (14 derniers jours)</h2>
                    <div class="chart-wrap">
                        <canvas id="chart-meteo-detail" aria-label="Graphique météo 14 jours"></canvas>
                    </div>
                </div>
            </div>
        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
