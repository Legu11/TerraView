<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Terraview - création de compte.">
    <title>Terraview - Inscription</title>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>

<header class="topbar">
    <div class="topbar-inner">
        <a href="index.html" class="brand">
            <span class="logo">T</span>
            <span class="name">Terraview</span>
        </a>
        <nav></nav>
        <div class="topbar-right">
            <a href="login.html" class="auth-link">J'ai déjà un compte</a>
        </div>
    </div>
</header>

<main class="auth-page">
    <div class="auth-card">
        <h1>Créer un compte</h1>
        <p class="auth-sub">Quelques infos et c'est parti.</p>

        <form id="signup-form" novalidate>
            <div class="form-row">
                <label for="nom">Nom</label>
                <input type="text" id="nom" name="nom" required minlength="2" autocomplete="name">
            </div>
            <div class="form-row">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>
            <div class="form-row">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
                <small>6 caractères minimum.</small>
            </div>
            <div class="form-row">
                <label for="password2">Confirmation</label>
                <input type="password" id="password2" name="password2" required autocomplete="new-password">
            </div>

            <div id="form-error" class="form-error" hidden></div>

            <button type="submit" class="btn btn-primary btn-block">Créer mon compte</button>
        </form>

        <p class="auth-footer">
            Déjà inscrit ? <a href="login.html">Connectez-vous</a>
        </p>
    </div>
</main>

<footer class="foot">Terraview - Bachelor 2 Sup de Vinci</footer>

<script src="js/api.js?v=3"></script>
<script src="js/auth.js?v=3"></script>
<script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errBox = document.getElementById('form-error');
        errBox.hidden = true;
        const nom = document.getElementById('nom').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;

        if (password !== password2) {
            errBox.textContent = "Les mots de passe ne correspondent pas.";
            errBox.hidden = false;
            return;
        }

        try {
            await register(nom, email, password);
            window.location.href = 'dashboard.html';
        } catch (err) {
            errBox.textContent = err.message;
            errBox.hidden = false;
        }
    });
</script>
</body>
</html>
